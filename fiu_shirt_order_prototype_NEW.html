
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIU Code Guru Shirt Order</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    margin:0;
    padding:40px;
}
.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px 35px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
h1{
    color:#081e3f;
}
.section{
    margin-bottom:25px;
}
.section h3{
    border-bottom:2px solid #eee;
    padding-bottom:5px;
}
label{
    display:block;
    margin-top:10px;
    font-weight:600;
}
input, select{
    width:100%;
    padding:8px;
    margin-top:4px;
    border-radius:4px;
    border:1px solid #ccc;
}
.inline{
    width:auto;
}
.buttons{
    margin-top:20px;
}
button{
    padding:10px 15px;
    margin-right:10px;
    border:none;
    border-radius:5px;
    background:#081e3f;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#0f2e66;
}
.total{
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}
</style>

<script>
function updateTotal(){
    let qtyS = parseInt(document.getElementById("s").value) || 0;
    let qtyM = parseInt(document.getElementById("m").value) || 0;
    let qtyL = parseInt(document.getElementById("l").value) || 0;
    let qtyXL = parseInt(document.getElementById("xl").value) || 0;

    let totalShirts = qtyS + qtyM + qtyL + qtyXL;
    let totalCost = totalShirts * 10;

    document.getElementById("totalCost").innerText = "$" + totalCost;
}

function clearForm(){
    document.getElementById("orderForm").reset();
    document.getElementById("totalCost").innerText = "$0";
}
</script>

</head>

<body>

<div class="container">
<h1>FIU Code Guru Competition Shirt Order</h1>

<form id="orderForm">

<div class="section">
<h3>Customer Information</h3>

<label>Name</label>
<input type="text">

<label>Address</label>
<input type="text">

<label>City</label>
<input type="text">

<label>State</label>
<input type="text">

<label>Zip</label>
<input type="text">

<label>Phone</label>
<input type="text">

<label>Email</label>
<input type="text">
</div>

<div class="section">
<h3>Payment Method</h3>

<label><input class="inline" type="radio" name="payment"> Credit Card</label>
<label><input class="inline" type="radio" name="payment"> PayPal</label>
<label><input class="inline" type="radio" name="payment"> Check</label>

</div>

<div class="section">
<h3>Team Information</h3>

<label>Team Name</label>
<input type="text">

</div>

<div class="section">
<h3>Shirt Options</h3>

<label>Shirt Type</label>
<select>
<option>Short Sleeve</option>
<option>Long Sleeve</option>
<option>Sleeveless Muscle Shirt</option>
</select>

<label>Shirt Color</label>
<select>
<option>White</option>
<option>Blue</option>
<option>Black</option>
</select>

<h4>Number of Shirts</h4>

<label>Small</label>
<input id="s" type="number" value="0" onchange="updateTotal()">

<label>Medium</label>
<input id="m" type="number" value="0" onchange="updateTotal()">

<label>Large</label>
<input id="l" type="number" value="0" onchange="updateTotal()">

<label>Extra Large</label>
<input id="xl" type="number" value="0" onchange="updateTotal()">

</div>

<div class="section">
<h3>Delivery</h3>

<label><input class="inline" type="radio" name="delivery"> Pick Up</label>
<label><input class="inline" type="radio" name="delivery"> Ship to Customer</label>

<label><input class="inline" type="checkbox"> Express Shipping</label>

</div>

<div class="section">
<h3>Order Summary</h3>

<div class="total">Total Cost: <span id="totalCost">$0</span></div>

</div>

<div class="buttons">
<button type="button">Place Order</button>
<button type="button" onclick="clearForm()">Clear Form</button>
<button type="button">Cancel / Exit</button>
</div>

</form>

</div>

</body>
</html>
